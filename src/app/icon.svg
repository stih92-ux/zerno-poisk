<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#1a2e1a"/>
  <!-- Wheat stalk -->
  <path d="M32 52 L32 22" stroke="#d4a843" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Wheat grains - left -->
  <ellipse cx="26" cy="18" rx="4" ry="7" fill="#d4a843" transform="rotate(-25 26 18)"/>
  <ellipse cx="24" cy="26" rx="3.5" ry="6.5" fill="#c49a38" transform="rotate(-30 24 26)"/>
  <ellipse cx="26" cy="34" rx="3" ry="5.5" fill="#b8902f" transform="rotate(-20 26 34)"/>
  <!-- Wheat grains - right -->
  <ellipse cx="38" cy="18" rx="4" ry="7" fill="#d4a843" transform="rotate(25 38 18)"/>
  <ellipse cx="40" cy="26" rx="3.5" ry="6.5" fill="#c49a38" transform="rotate(30 40 26)"/>
  <ellipse cx="38" cy="34" rx="3" ry="5.5" fill="#b8902f" transform="rotate(20 38 34)"/>
  <!-- Top grain -->
  <ellipse cx="32" cy="13" rx="3.5" ry="6" fill="#e0b84d"/>
  <!-- Awns (whiskers) -->
  <line x1="32" y1="7" x2="28" y2="2" stroke="#d4a843" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="32" y1="7" x2="36" y2="2" stroke="#d4a843" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="26" y1="12" x2="19" y2="7" stroke="#d4a843" stroke-width="1" stroke-linecap="round"/>
  <line x1="38" y1="12" x2="45" y2="7" stroke="#d4a843" stroke-width="1" stroke-linecap="round"/>
</svg>
